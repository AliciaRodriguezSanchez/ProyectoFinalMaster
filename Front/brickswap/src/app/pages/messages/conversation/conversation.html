<main class="conversation-page">
  <section class="conversation-page__shell" [attr.aria-label]="text.conversationAria">
    <ng-container *ngIf="product() as loadedProduct">
      <app-message-conversation-header
        *ngIf="contact() as loadedContact"
        [contact]="loadedContact"
        [product]="loadedProduct"
        (back)="onBack()"
      ></app-message-conversation-header>
    </ng-container>

    <p class="conversation-page__loading" *ngIf="isLoading()">{{ text.loadingConversation }}</p>

    <p
      class="conversation-page__report-status"
      [class.conversation-page__report-status--resolved]="isReportResolved()"
      *ngIf="!isLoading() && isModeratorView()"
    >
      {{ reportStatusLabel() }}
    </p>

    <app-message-thread
      *ngIf="!isLoading() && hasMessages(); else emptyConversation"
      [messages]="messages()"
    ></app-message-thread>

    <ng-template #emptyConversation>
      <app-message-empty-state
        *ngIf="!isLoading() && !isModeratorView()"
        [text]="emptyText"
      ></app-message-empty-state>
      <div
        class="conversation-page__empty-thread"
        *ngIf="!isLoading() && isModeratorView()"
        aria-hidden="true"
      ></div>
    </ng-template>

    <footer class="conversation-page__footer" *ngIf="canReplyReport()">
      <app-report-message-composer
        (messageSent)="onMessageSent($event)"
      ></app-report-message-composer>
    </footer>

    <footer class="conversation-page__footer" *ngIf="!isModeratorView()">
      <app-message-actions
        [showPrice]="isReceiver()"
        [showDelivery]="isSender()"
        [showBuy]="isReceiver() && isLoggedIn()"
        (actionSelected)="onActionSelected($event)"
      ></app-message-actions>
      <app-message-composer
        (messageSent)="onMessageSent($event)"
      ></app-message-composer>
    </footer>
  </section>
</main>
