<div class="container my-4">
  <div class="row">
    
    <aside class="col-12 col-lg-3 mb-4">
      <app-filter-sidebar 
        (onFilterChange)="onApplyCatalogFilters($event)" 
        (onReset)="onResetCatalog()">
        
        <div class="mb-3">
          <label class="form-label small fw-semibold text-secondary">Categoría LEGO®</label>
          <select class="form-select form-select-sm" [(ngModel)]="selectedCategory">
            <option value="">Todas las temáticas</option>
            <option value="1">Star Wars</option>
            <option value="2">Technic</option>
            <option value="3">City</option>
            <option value="4">Harry Potter</option>
            <option value="5">Creator Expert</option>
            <option value="6">Minifiguras</option>
            <option value="7">Ideas</option>
            <option value="8">Speed Champions</option>
            <option value="9">Ninjago</option>
            <option value="10">Marvel</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold text-secondary">Condición</label>
          <select class="form-select form-select-sm" [(ngModel)]="selectedCondition">
            <option value="">Todas las condiciones</option>
            <option value="Nuevo">Nuevo</option>
            <option value="Como nuevo">Como nuevo</option>
            <option value="Buen estado">Buen estado</option>
            <option value="Aceptable">Aceptable</option>
          </select>
        </div>

        <div class="mb-2">
          <div class="d-flex justify-content-between">
            <label class="form-label small fw-semibold text-secondary">Precio máximo</label>
            <span class="badge bg-dark text-warning small">{{ maxPrice }}€</span>
          </div>
          <input type="range" 
                 class="form-range" 
                 min="0" 
                 max="1000" 
                 step="10" 
                 [(ngModel)]="maxPrice">
        </div>

      </app-filter-sidebar>
    </aside>

    <main class="col-12 col-lg-9">
      
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold text-dark m-0">Available Sets</h4>
        <span class="text-muted small fw-semibold">
          Showing {{ filteredArticles().length }} results
        </span>
      </div>

      <div *ngIf="isLoading()" class="alert alert-light text-center border-0 shadow-sm rounded-3 py-4">
        <p class="m-0 fw-bold">Cargando artículos...</p>
      </div>

      <div *ngIf="!isLoading() && filtersApplied() && filteredArticles().length === 0" class="alert alert-warning text-center border-0 shadow-sm rounded-3 py-4">
        <p class="m-0 fw-bold">🧩 No hay sets de LEGO® que cumplan tus requerimientos.</p>
        <small class="text-muted">¡Intenta ajustar tus filtros o resetéalos y prueba de nuevo!</small>
      </div>

      <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
        <div class="col" *ngFor="let item of filteredArticles()">
          
          <ui-product-card
            [imageUrl]="item.foto"
            [title]="item.titulo"
            [price]="item.precio"
            [condition]="item.estado_articulo"
            [showBadge]="true"
            [badgeText]="item.estado_venta"
            [publishedAt]="item.fecha_publicacion || ''"
            [detailRoute]="['/article', item.id]"
          ></ui-product-card>
          
        </div>
      </div>

    </main>

  </div>
</div>
