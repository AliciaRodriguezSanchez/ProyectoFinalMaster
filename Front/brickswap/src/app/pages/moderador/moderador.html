<section class="container">
    @if (showAdminBackButton) {
      <button type="button" class="moderador-back" (click)="goBack()">
      <span aria-hidden="true">←</span>
      Volver
      </button>
    }

    <app-title size="large" text="Panel de Moderación"></app-title> 
    <app-descriptions format="body" text="Hola Moderador, gestiona los reportes pendientes."></app-descriptions>
    <div class="row g-4 mt-4">
      @for(stadistic of totalStadistics(); track $index){
        <div class="col-12 col-lg-4" (click)="cambiarEstadoUrl(stadistic.label)">
          <app-card-panel class="w-100 d-block" [stat]="stadistic" [isActive]="estadoActual() === stadistic.label"></app-card-panel>
        </div>
      }
    </div>
    <div class="mt-5">
      <app-table [typeTable]="estadoActual()" [data]="reportsTables()" (onGuardarResolucion)="guardarResolucion($event)" (ordenarEvent)="cambiarOrden()"></app-table>
    </div>
</section>
