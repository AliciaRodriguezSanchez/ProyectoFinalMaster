<section class="article-form-shell">
<app-form-template
  title=""
  subtitle="">

  <a class="article-form__back" routerLink="/catalog">
    <span aria-hidden="true">←</span>
    Volver
  </a>

  <h1 class="article-form__title">Publicar artículo</h1>

  <form [formGroup]="articleForm" novalidate>
    <ui-input
      class="article-form__field article-form__field--photo"
      label="Foto del Lego"
      icon="email"
      placeholder="https://ejemplo.com/lego-set.jpg"
      formControlName="foto"
      [required]="true"
      [invalid]="!!(articleForm.get('foto')?.touched && articleForm.get('foto')?.invalid)"
      [errorMessage]="text.articleForm.imageUrlInvalid"
    ></ui-input>

    <ui-input
      class="article-form__field"
      label="Título"
      icon="profile"
      placeholder="Ej: Star Wars Millennium Falcon"
      formControlName="titulo"
      [required]="true"
      [invalid]="!!(articleForm.get('titulo')?.touched && articleForm.get('titulo')?.invalid)"
      errorMessage="Por favor introduce un título válido (mínimo 5 caracteres)."
    ></ui-input>

    <ui-textarea
      class="article-form__field"
      label="Descripción"
      [rows]="5"
      placeholder="Describe tu set: minifiguras incluidas, instrucciones, estado de la caja..."
      [value]="articleForm.get('descripcion')?.value || ''"
      [required]="true"
      [invalid]="!!(articleForm.get('descripcion')?.touched && articleForm.get('descripcion')?.invalid)"
      errorMessage="Por favor proporciona una breve descripción (mínimo 15 caracteres)."
      (valueChange)="updateDescription($event)"
    ></ui-textarea>

    <div class="article-form__grid">
      <ui-input
        class="article-form__field"
        label="Precio (€)"
        type="number"
        icon="currency"
        placeholder="0.00"
        step="0.01"
        formControlName="precio"
        [required]="true"
        [invalid]="!!(articleForm.get('precio')?.touched && articleForm.get('precio')?.invalid)"
        errorMessage="Por favor introduce un precio mayor que 0."
      ></ui-input>

      <ui-select
        class="article-form__field"
        label="Categoría"
        placeholder="Selecciona tu categoría..."
        formControlName="categoria_id"
        [options]="categoryOptions()"
        [required]="true"
        [invalid]="!!(articleForm.get('categoria_id')?.touched && articleForm.get('categoria_id')?.invalid)"
        errorMessage="Por favor selecciona una categoría válida."
      ></ui-select>

      <ui-select
        class="article-form__field"
        label="Estado de conservación"
        placeholder="Selecciona tu condición..."
        formControlName="estado_articulo"
        [options]="conditionOptions"
        [required]="true"
        [invalid]="!!(articleForm.get('estado_articulo')?.touched && articleForm.get('estado_articulo')?.invalid)"
        errorMessage="Por favor marca un estado de cómo está tu artículo"
      ></ui-select>
    </div>

    <div class="article-form__actions">
      <ui-button
        class="article-form__action article-form__action--draft"
        label="Guardar borrador"
        variant="outline"
        size="sm"
        (clicked)="submitForm('Borrador')"
      ></ui-button>

      <ui-button
        class="article-form__action article-form__action--publish"
        label="Publicar"
        variant="primary"
        size="sm"
        (clicked)="submitForm('Publicado')"
      ></ui-button>
    </div>
  </form>
</app-form-template>
</section>
