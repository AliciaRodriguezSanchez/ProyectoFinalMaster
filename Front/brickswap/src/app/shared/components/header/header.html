<header class="app-header">
  <a class="app-header__brand" routerLink="/catalog" aria-label="Ir a Catalogo">
    <ui-logo text="BrickSwap"></ui-logo>
  </a>

  <nav class="app-header__nav" aria-label="Navegacion principal">
    <a
      class="app-header__link"
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="app-header__link--active"
      (click)="closeMenu()"
    >
      @if (item.icon === 'search') {
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <path d="m16 16 4 4" />
        </svg>
      }
      @if (item.icon === 'home') {
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M3 11.5 12 4l9 7.5" />
          <path d="M5 10.5V20h14v-9.5" />
          <path d="M9 20v-6h6v6" />
        </svg>
      }
      <span>{{ item.label }}</span>
    </a>

    <a class="app-header__user" [routerLink]="profileRoute" [attr.aria-label]="profileLabel">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4" />
        <path d="M5 20a7 7 0 0 1 14 0" />
      </svg>
    </a>

    @if (role) {
      <button class="app-header__logout" type="button" aria-label="Cerrar sesion" (click)="logout()">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10 17l5-5-5-5" />
          <path d="M15 12H3" />
          <path d="M21 3v18" />
        </svg>
        <span>Cerrar sesion</span>
      </button>
    }
  </nav>

  <button
    class="app-header__menu-button"
    type="button"
    aria-label="Abrir menu"
    [attr.aria-expanded]="isMenuOpen()"
    (click)="toggleMenu()"
  >
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path d="M4 7h16" />
      <path d="M4 12h16" />
      <path d="M4 17h16" />
    </svg>
  </button>

  @if (isMenuOpen()) {
    <nav class="app-header__menu" aria-label="Menu movil">
      <a
        class="app-header__menu-link"
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="app-header__menu-link--active"
        (click)="closeMenu()"
      >
        @if (item.icon === 'search') {
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <path d="m16 16 4 4" />
          </svg>
        }
        @if (item.icon === 'home') {
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 11.5 12 4l9 7.5" />
            <path d="M5 10.5V20h14v-9.5" />
            <path d="M9 20v-6h6v6" />
          </svg>
        }
        <span>{{ item.label }}</span>
      </a>

      <a class="app-header__menu-link" [routerLink]="profileRoute" (click)="closeMenu()">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4" />
          <path d="M5 20a7 7 0 0 1 14 0" />
        </svg>
        <span>{{ profileLabel }}</span>
      </a>

      @if (role) {
        <button class="app-header__menu-link app-header__menu-link--button" type="button" (click)="logout()">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M10 17l5-5-5-5" />
            <path d="M15 12H3" />
            <path d="M21 3v18" />
          </svg>
          <span>Cerrar sesion</span>
        </button>
      }
    </nav>
  }
</header>
