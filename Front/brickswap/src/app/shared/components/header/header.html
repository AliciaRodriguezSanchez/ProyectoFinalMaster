<header class="app-header">
  <a class="app-header__brand" routerLink="/home" aria-label="Ir a Home">
    <ui-logo text="BrickSwap"></ui-logo>
  </a>

  <nav class="app-header__nav" aria-label="Navegacion principal">
    <a
      class="app-header__link"
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="app-header__link--active"
    >
      @if (item.icon === 'search') {
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <path d="m16 16 4 4" />
        </svg>
      }
      <span>{{ item.label }}</span>
    </a>

    <a class="app-header__user" [routerLink]="profileRoute" [attr.aria-label]="profileLabel">
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4" />
        <path d="M5 20a7 7 0 0 1 14 0" />
      </svg>
    </a>

    @if (role) {
      <button class="app-header__logout" type="button" aria-label="Cerrar sesion" (click)="logout()">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10 17l5-5-5-5" />
          <path d="M15 12H3" />
          <path d="M21 3v18" />
        </svg>
        <span>Cerrar sesion</span>
      </button>
    }
  </nav>
</header>
