<div class="modal fade" id="modalValoracion" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalLabel">Valorar compra</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>¿Qué te ha parecido el artículo con ID: {{ articleId }}?</p>
        
        <div class="text-center my-4">
          <p class="text-muted fst-italic">PENDIENTE DESARROLLAR COMPONENTE ESTRELLITAS</p>
        </div>
        
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" (click)="guardarValoracion()">Enviar valoración</button>
      </div>
    </div>
  </div>
</div>
