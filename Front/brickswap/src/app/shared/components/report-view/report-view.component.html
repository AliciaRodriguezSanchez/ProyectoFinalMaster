<div class="custom-modal-overlay d-flex justify-content-center align-items-center">
  
  <div class="custom-modal-container d-flex position-relative text-white shadow-lg">
    
    <button class="btn-close-custom position-absolute" (click)="cerrarModal()">
      <i class="bi bi-x fs-5"></i>
    </button>

    <div class="modal-left d-flex justify-content-center align-items-center p-4 border-end">
      <div class="image-placeholder d-flex justify-content-center align-items-center">
        <i class="bi bi-image text-secondary fs-1"></i>
      </div>
    </div>

    <div class="modal-right p-4 p-md-5 d-flex flex-column gap-3">
      <h4 class="fw-bold mb-2">Panel de detalle del reporte</h4>
      
      <div class="d-flex flex-column gap-2 text-light" style="font-size: 0.95rem;">
        <div><strong class="text-white">Artículo:</strong> {{ reporte()?.title }}</div>
        <div><strong class="text-white">Motivo:</strong> {{ reporte()?.reason }}</div>
        <div><strong class="text-white">Reportado por:</strong> {{ reporte()?.customer }}</div>
        <div><strong class="text-white">Fecha y hora:</strong> {{ reporte()?.time | date:'dd/MM/yyyy, HH:mm' }}</div>
      </div>

      @if(estado()=== 'Pendiente'){
        <div class="mt-3">
          <textarea 
            class="form-control custom-textarea shadow-none"
            [(ngModel)]="resolucionText" 
            rows="3" 
            placeholder="Explica el motivo de la decisión tomada... (Obligatorio)"></textarea>
        </div>
  
        <div class="d-flex gap-3 mt-4">
          <button 
            class="btn btn-success flex-grow-1 rounded-3 py-2 fw-semibold"
            [disabled]="!resolucionText.trim()"
            (click)="resolver('aprobar')">
            Aprobar artículo
          </button>
          <button 
            class="btn btn-danger flex-grow-1 rounded-3 py-2 fw-semibold"
            [disabled]="!resolucionText.trim()"
            (click)="resolver('retirar')">
            Retirar artículo
          </button>
        </div>
      }@else {
        <div class="mt-auto bg-dark p-3 rounded-3 border-start border-4 border-info">
          <small class="text-info fw-bold text-uppercase">Resolución aplicada:</small>
          <p class="text-white m-0">{{ reporte()?.resolution }}</p>
        </div>
      }


    </div>
  </div>
</div>
