<div class="card h-100 shadow-sm border-0 position-relative animate-card">
  
  <span class="position-absolute top-0 start-0 m-2 badge"
        [class.bg-success]="article.estado_venta === 'Disponible'"
        [class.bg-warning]="article.estado_venta === 'Reservado'"
        [class.bg-danger]="article.estado_venta === 'Vendido'">
    {{ article.estado_venta }}
  </span>

  <img [src]="article.foto || 'https://placehold.co/400x300?text=No+Image'" 
       class="card-img-top object-fit-cover" 
       alt="{{ article.titulo }}" 
       style="height: 200px;">

  <div class="card-body d-flex flex-column justify-content-between">
    <div>
      <h5 class="card-title text-truncate mb-1 fw-bold">{{ article.titulo }}</h5>
      <p class="text-muted small mb-2">Condition: <span class="badge bg-light text-dark border">{{ article.estado_articulo }}</span></p>
    </div>

    <div class="d-flex align-items-center justify-content-between mt-3">
      <span class="fs-4 fw-extrabold text-primary">{{ article.precio | currency:'EUR':'symbol':'1.2-2' }}</span>
      
      <a [routerLink]="['/article', article.id]" class="btn btn-outline-secondary btn-sm px-3">
        Ver detalles
      </a>
    </div>
  </div>
</div>
