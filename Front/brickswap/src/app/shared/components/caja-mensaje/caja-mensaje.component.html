
<div class="message-card d-flex align-items-center justify-content-between p-3 rounded-3 border bg-white gap-3 w-100">
  <div class="d-flex align-items-center gap-3 flex-grow-1 min-width-0">
    <div class="message-card__avatar rounded-circle d-flex align-items-center justify-content-center flex-shrink-0">
      {{ initials }}
    </div>
    <div class="d-flex flex-column gap-1 overflow-hidden">
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span class="fw-semibold small">{{ name() }}</span>
        <span class="message-card__badge badge rounded-pill" [class]="'badge--' + currentStatus()">
          {{ currentStatus() | statusLabel}}
        </span>
      </div>
      <span class="text-muted small">{{ product() }}</span>
      @if (messagePreview) {
        <span class="text-muted" style="font-size: 12px;">{{ messagePreview }}</span>
      }
    </div>
  </div>

  <div class="d-flex flex-column align-items-end gap-2 flex-shrink-0">
    <span class="text-muted" style="font-size: 12px;">{{ timeAgo() }}</span>
    @if (showStatusSelect()) {
      <select class="message-card__select form-select form-select-sm" 
      [value]="currentStatus()" 
      (change)="onStatusChange($event)"
      (click)="onSelectClick($event)">
        @for (opt of statusOptions; track opt) {
          <option [value]="opt" [selected]="opt === currentStatus()">{{ opt | statusLabel }}</option>
        }
      </select>
    }
  </div>
</div>
