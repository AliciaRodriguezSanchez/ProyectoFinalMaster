<form class="message-composer" (ngSubmit)="sendMessage()">
  <label class="message-composer__label" for="message-text">{{ text.composerLabel }}</label>
  <input
    id="message-text"
    name="message"
    type="text"
    [(ngModel)]="message"
    [placeholder]="text.composerPlaceholder"
    autocomplete="off"
  />
  <button type="submit" [attr.aria-label]="text.composerSendAria">
    <span aria-hidden="true">></span>
  </button>
</form>
