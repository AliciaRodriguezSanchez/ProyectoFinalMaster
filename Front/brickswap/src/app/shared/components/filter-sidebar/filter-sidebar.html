<div class="card shadow-sm border-0 bg-light p-3 rounded-3 mb-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold text-dark m-0">🔍 Filtros</h5>
    <button class="btn btn-link btn-sm text-decoration-none text-muted p-0" (click)="resetFilters()">
      Resetear filtros
    </button>
  </div>

  <div class="mb-3">
    <label class="form-label small fw-semibold text-secondary">Palabra clave</label>
    <input type="text" 
           class="form-control form-control-sm" 
           placeholder="Buscar..."
           [(ngModel)]="searchText"
           (input)="applyFilters()">
  </div>

  <div class="extra-filters">
    <ng-content></ng-content>
  </div>

  <button class="btn btn-warning btn-sm w-100 fw-bold shadow-sm mt-3" (click)="applyFilters()">
    Aplicar filtros activos
  </button>
</div>
