<div class="card shadow-sm border-0 bg-light p-3 rounded-3 mb-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="filter-sidebar__title fw-bold text-dark m-0">
      🔍 Filtros
      @if (activeFiltersCount() > 0) {
        <span class="filter-sidebar__title-status">
          <span class="filter-sidebar__active-dot" aria-hidden="true"></span>
          <span>({{ activeFiltersCount() }} filtros aplicados)</span>
        </span>
      }
    </h5>
  </div>

  <span class="filter-sidebar__handle" aria-hidden="true"></span>

  <div class="mb-3">
    <label class="form-label small fw-semibold text-secondary">Palabra clave</label>
    <input type="text" 
           class="form-control form-control-sm" 
           placeholder="Buscar..."
           [(ngModel)]="searchText">
  </div>

  <div class="extra-filters">
    <ng-content></ng-content>
  </div>

  <div class="filter-sidebar__actions">
    <button class="btn btn-warning btn-sm w-100 fw-bold shadow-sm" (click)="applyFilters()">
      Aplicar filtros
    </button>

    <button class="filter-sidebar__reset btn btn-warning btn-sm w-100 fw-bold" (click)="resetFilters()">
      @if (hasActiveFilters()) {
        <span class="filter-sidebar__active-dot" aria-hidden="true"></span>
      }
      Limpiar filtros
    </button>
  </div>
</div>
