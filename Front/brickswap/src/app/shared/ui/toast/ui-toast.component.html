<div class="toast-container" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.messages(); track toast.id) {
    <div
      class="toast-message"
      [class.toast-message--error]="toast.type === 'error'"
      [class.toast-message--success]="toast.type === 'success'"
    >
      <span class="toast-message__icon" aria-hidden="true">
        {{ toast.type === 'success' ? '✓' : '!' }}
      </span>
      <p>{{ toast.message }}</p>
      <button type="button" aria-label="Cerrar mensaje" (click)="toastService.remove(toast.id)">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M6 6l12 12M18 6 6 18" />
        </svg>
      </button>
    </div>
  }
</div>
