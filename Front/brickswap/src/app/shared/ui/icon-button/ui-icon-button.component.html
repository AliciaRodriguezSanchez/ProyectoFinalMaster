<button
  class="ui-icon-button"
  type="button"
  [class.ui-icon-button--danger]="variant() === 'danger'"
  [class.ui-icon-button--icon-only]="iconOnly()"
  [attr.aria-label]="label()"
  [disabled]="disabled()"
  (click)="onClick()"
>
  <span class="ui-icon-button__icon" aria-hidden="true">
    @switch (icon()) {
      @case ('message') {
        <svg viewBox="0 0 24 24">
          <path d="M5 6.5h14v9H8.6L5 18.5v-12Z" />
          <path d="M8 9.5h8" />
          <path d="M8 12.5h5" />
        </svg>
      }
      @case ('flag') {
        <svg viewBox="0 0 24 24">
          <path d="M6 20V5" />
          <path d="M6 5h11l-1.6 3L17 11H6" />
        </svg>
      }
      @case ('reserve') {
        <svg viewBox="0 0 24 24">
          <path d="M7 4h10v16l-5-3-5 3V4Z" />
        </svg>
      }
    }
  </span>

  @if (!iconOnly()) {
    <span class="ui-icon-button__label">{{ label() }}</span>
  }
</button>
